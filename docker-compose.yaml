version: '3.8'

services:
  # Database
  database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maritimedb
    volumes:
      - db_data:/var/lib/postgresql/data

  # Backend API
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@database:5432/maritimedb
      JWT_SECRET: mysecretkey
      PORT: 3000
    depends_on:
      - database

  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  db_data: